baseURL = 'https://www.aufildesimages.fr'
defaultContentLanguage = 'fr'
enableRobotsTXT = true
locale = 'fr-fr'
title = 'Au fil des images'
theme = "poison"
paginate = 10
pluralizelisttitles = false
timeZone = "Europe/Paris"

[frontmatter]
date = ["date", "publishDate", "lastmod"]
lastmod = ["lastmod", ":git", "date", "publishDate"]

[params]
brand = "Au fil des images"
description = "Reflexions sur la photographie"
author = "Au fil des images"
dark_mode = false
front_page_content = ["posts"]
rss_icon = true
rss_section = "posts"

menu = [
  {Name = "Accueil", URL = "/", HasChildren = false},
  {Name = "Carnet", URL = "/posts/", Pre = "Derniers articles", HasChildren = true, Limit = 5},
]

# Charte graphique inspiree de jeanmarielafon.com
moon_sun_background_color = "#cccccc"
moon_sun_color = "#cc0000"
sidebar_a_color = "#222222"
sidebar_bg_color = "#f5f5f5"
sidebar_h1_color = "#222222"
sidebar_img_border_color = "#ffffff"
sidebar_p_color = "#555555"
sidebar_socials_color = "#cc0000"

code_color = "#222222"
code_background_color = "#e8e8e8"
code_block_color = "#f5f5f5"
code_block_background_color = "#1f1f1f"
content_bg_color = "#f5f5f5"
date_color = "#555555"
link_color = "#cc0000"
list_color = "#222222"
post_title_color = "#222222"
table_border_color = "#dddddd"
table_stripe_color = "#ffffff"
text_color = "#222222"

code_color_dark = "#e0e0e0"
code_background_color_dark = "#333333"
code_block_color_dark = "#f5f5f5"
code_block_background_color_dark = "#111111"
content_bg_color_dark = "#1f1f1f"
date_color_dark = "#b8b8b8"
link_color_dark = "#ff4d4d"
list_color_dark = "#e0e0e0"
post_title_color_dark = "#e0e0e0"
table_border_color_dark = "#333333"
table_stripe_color_dark = "#2a2a2a"
text_color_dark = "#e0e0e0"

[taxonomies]
series = 'series'
tags = 'tags'

[sitemap]
changefreq = 'weekly'
filename = 'sitemap.xml'
priority = 0.5
